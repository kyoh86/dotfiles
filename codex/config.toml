check_for_update_on_startup = false
update_on_startup = false
sandbox_mode = "workspace-write"
personality = "pragmatic"
web_search = "cached"
model = "gpt-5.5"
model_reasoning_effort = "medium"

[features]
shell_snapshot = true

[sandbox_workspace_write]
network_access = true

[mcp_servers.nvim_mcp_proxy]
url = "http://127.0.0.1:37126/mcp"

[mcp_servers.nvim_mcp_proxy.tools.nvim_instances]
approval_mode = "approve"

[mcp_servers.nvim_mcp_proxy.tools.nvim_cwd]
approval_mode = "approve"

[mcp_servers.nvim_mcp_proxy.tools.nvim_current_buffer]
approval_mode = "approve"

[mcp_servers.nvim_mcp_proxy.tools.nvim_get_buffer_content]
approval_mode = "approve"

[notice.model_migrations]
"gpt-5.2-codex" = "gpt-5.3-codex"
"gpt-5.3-codex" = "gpt-5.4"
"gpt-5.4" = "gpt-5.5"

[plugins."github@openai-curated"]
enabled = true

[tui.model_availability_nux]
"gpt-5.5" = 4

