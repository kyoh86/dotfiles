set-option -g mode-keys vi

bind-key -T prefix ` copy-mode
bind-key -T prefix y copy-mode

# Escape copy-mode with not only q (default), but also esc
bind-key -T copy-mode-vi Escape send-keys -X cancel

# Jump between shell prompts recorded by OSC 133 markers.
bind-key -T copy-mode-vi Up send-keys -X previous-prompt -o
bind-key -T copy-mode-vi Down send-keys -X next-prompt -o

# vim:ft=tmux
