# copy-mode selections are routed to Neovim registers through nvim-proxy.
set-option -gF @copy_to_nvim_register '#{XDG_CONFIG_HOME}/dotfiles-tool/bin/tmux-copy-to-nvim-register'
set-option -gF @paste_from_nvim_register '#{XDG_CONFIG_HOME}/dotfiles-tool/bin/tmux-paste-from-nvim-register'
set-option -gF @open_in_nvim '#{XDG_CONFIG_HOME}/dotfiles-tool/bin/tmux-open-in-nvim'

bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel '#{@copy_to_nvim_register} "\""'
bind-key -T copy-mode-vi g switch-client -T copy-mode-vi-g
bind-key -T copy-mode-vi-g y send-keys -X copy-pipe-and-cancel '#{@copy_to_nvim_register} "+"'
bind-key -T copy-mode-vi-g g send-keys -X history-top
bind-key -T copy-mode-vi-g x send-keys -X copy-pipe-and-cancel 'TMUX_COPY_CURSOR_X=#{q:copy_cursor_x} TMUX_COPY_CURSOR_LINE=#{q:copy_cursor_line} TMUX_COPY_PANE_CWD=#{q:pane_current_path} #{@open_in_nvim} extra'
bind-key -T copy-mode-vi-g z send-keys -X copy-pipe-and-cancel 'TMUX_COPY_CURSOR_X=#{q:copy_cursor_x} TMUX_COPY_CURSOR_LINE=#{q:copy_cursor_line} TMUX_COPY_PANE_CWD=#{q:pane_current_path} #{@open_in_nvim} extra'
bind-key -T copy-mode-vi-g f send-keys -X copy-pipe-and-cancel 'TMUX_COPY_CURSOR_X=#{q:copy_cursor_x} TMUX_COPY_CURSOR_LINE=#{q:copy_cursor_line} TMUX_COPY_PANE_CWD=#{q:pane_current_path} #{@open_in_nvim} file none'

# paste from Neovim registers
bind-key p run-shell -b '#{b:@paste_from_nvim_register}'
bind-key g switch-client -T paste-registers
# Common registers: " (default/unnamed), + (clipboard), * (selection)
bind-key -T paste-registers p run-shell -b '#{b:@paste_from_nvim_register} "+"'
bind-key -T paste-registers + run-shell -b '#{b:@paste_from_nvim_register} "+"'
bind-key -T paste-registers "*" run-shell -b '#{b:@paste_from_nvim_register} "*"'
bind-key -T paste-registers "0" run-shell -b '#{b:@paste_from_nvim_register} "0"'
bind-key -T paste-registers "1" run-shell -b '#{b:@paste_from_nvim_register} "1"'
bind-key -T paste-registers "2" run-shell -b '#{b:@paste_from_nvim_register} "2"'
bind-key -T paste-registers "3" run-shell -b '#{b:@paste_from_nvim_register} "3"'
bind-key -T paste-registers "4" run-shell -b '#{b:@paste_from_nvim_register} "4"'
bind-key -T paste-registers "5" run-shell -b '#{b:@paste_from_nvim_register} "5"'
bind-key -T paste-registers "6" run-shell -b '#{b:@paste_from_nvim_register} "6"'
bind-key -T paste-registers "7" run-shell -b '#{b:@paste_from_nvim_register} "7"'
bind-key -T paste-registers "8" run-shell -b '#{b:@paste_from_nvim_register} "8"'
bind-key -T paste-registers "9" run-shell -b '#{b:@paste_from_nvim_register} "9"'

# vim:ft=tmux
