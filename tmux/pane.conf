bind-key -n C-w switch-client -T vim-C-W

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
# See: nvim/lua/kyoh86/plug/tmux-nav.lua
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -r -T vim-C-W 'C-h' if-shell "$is_vim" 'send-keys C-w C-h'  'select-pane -L'
bind-key -r -T vim-C-W   'h' if-shell "$is_vim" 'send-keys C-w h'    'select-pane -L'
bind-key -r -T vim-C-W 'C-j' if-shell "$is_vim" 'send-keys C-w C-j'  'select-pane -D'
bind-key -r -T vim-C-W   'j' if-shell "$is_vim" 'send-keys C-w j'    'select-pane -D'
bind-key -r -T vim-C-W 'C-k' if-shell "$is_vim" 'send-keys C-w C-k'  'select-pane -U'
bind-key -r -T vim-C-W   'k' if-shell "$is_vim" 'send-keys C-w k'    'select-pane -U'
bind-key -r -T vim-C-W 'C-l' if-shell "$is_vim" 'send-keys C-w C-l'  'select-pane -R'
bind-key -r -T vim-C-W   'l' if-shell "$is_vim" 'send-keys C-w l'    'select-pane -R'

