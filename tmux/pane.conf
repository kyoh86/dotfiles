unbind-key c # new-window

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
# See: nvim/lua/kyoh86/plug/tmux-nav.lua

# layout-paredit command
set-environment -g PATH "$HOME/.deno/bin:/usr/local/bin:/usr/bin:/bin"
set-option -gF @layout_paredit '#{XDG_CONFIG_HOME}/dotfiles-tool/dest/tmux-layout-paredit'

# smart-focus command
set-option -gF @smart_focus '#{XDG_CONFIG_HOME}/dotfiles-tool/dest/tmux-smart-focus'

# Smart focus navigation (Ctrl-w then h/j/k/l)
# Ctrl-w: if in nvim, pass through; otherwise switch to pane-focus table
bind-key -n C-w if-shell -F '#{==:#{pane_current_command},nvim}' 'send-keys C-w' 'switch-client -T pane-focus'

# pane-focus key table
bind-key -T pane-focus h run-shell "#{@smart_focus} h"
bind-key -T pane-focus j run-shell "#{@smart_focus} j"
bind-key -T pane-focus k run-shell "#{@smart_focus} k"
bind-key -T pane-focus l run-shell "#{@smart_focus} l"

# Exit pane-focus mode on any other key
bind-key -T pane-focus Any send-keys

# Enter submode with prefix + C-w
bind-key C-w run-shell '#{@layout_paredit} enter' \; switch-client -T layout-paredit

# Keep submode alive after most operations.
bind-key -T layout-paredit u run-shell '#{@layout_paredit} parent' \; switch-client -T layout-paredit
bind-key -T layout-paredit 1 run-shell '#{@layout_paredit} child0' \; switch-client -T layout-paredit
bind-key -T layout-paredit 2 run-shell '#{@layout_paredit} child1' \; switch-client -T layout-paredit
bind-key -T layout-paredit o run-shell '#{@layout_paredit} sibling' \; switch-client -T layout-paredit
bind-key -T layout-paredit . run-shell '#{@layout_paredit} select-focus' \; switch-client -T layout-paredit

# split selected pane
bind-key -T layout-paredit v run-shell '#{@layout_paredit} split-v' \; switch-client -T layout-paredit
bind-key -T layout-paredit s run-shell '#{@layout_paredit} split-s' \; switch-client -T layout-paredit

# subtree operations
bind-key -T layout-paredit f run-shell '#{@layout_paredit} flip' \; switch-client -T layout-paredit
bind-key -T layout-paredit r run-shell '#{@layout_paredit} rotate' \; switch-client -T layout-paredit

# toggle split direction
bind-key -T layout-paredit t run-shell '#{@layout_paredit} toggle' \; switch-client -T layout-paredit

# selected split ratio
bind-key -T layout-paredit [ run-shell '#{@layout_paredit} grow0' \; switch-client -T layout-paredit
bind-key -T layout-paredit ] run-shell '#{@layout_paredit} grow1' \; switch-client -T layout-paredit

# leave mode and clear tint
bind-key -T layout-paredit q run-shell '#{@layout_paredit} clear'
bind-key -T layout-paredit C-c run-shell '#{@layout_paredit} clear'

# Focus navigation with selection update
bind-key -T layout-paredit 'C-h' run-shell 'tmux select-pane -L && #{@layout_paredit} select-focus && tmux switch-client -T layout-paredit'
bind-key -T layout-paredit   'h' run-shell 'tmux select-pane -L && #{@layout_paredit} select-focus && tmux switch-client -T layout-paredit'
bind-key -T layout-paredit 'C-j' run-shell 'tmux select-pane -D && #{@layout_paredit} select-focus && tmux switch-client -T layout-paredit'
bind-key -T layout-paredit   'j' run-shell 'tmux select-pane -D && #{@layout_paredit} select-focus && tmux switch-client -T layout-paredit'
bind-key -T layout-paredit 'C-k' run-shell 'tmux select-pane -U && #{@layout_paredit} select-focus && tmux switch-client -T layout-paredit'
bind-key -T layout-paredit   'k' run-shell 'tmux select-pane -U && #{@layout_paredit} select-focus && tmux switch-client -T layout-paredit'
bind-key -T layout-paredit 'C-l' run-shell 'tmux select-pane -R && #{@layout_paredit} select-focus && tmux switch-client -T layout-paredit'
bind-key -T layout-paredit   'l' run-shell 'tmux select-pane -R && #{@layout_paredit} select-focus && tmux switch-client -T layout-paredit'

# Catch undefined keys in this key-table.
# Without this, an undefined key leaves the transient key-table without clearing tint/state.
# The key is intentionally consumed rather than passed through.
bind-key -T layout-paredit Any run-shell '#{@layout_paredit} clear'

# vim:ft=tmux
